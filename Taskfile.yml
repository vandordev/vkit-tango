version: "3"

tasks:
  default:
    cmds: ["rtk task --list"]
  install:
    cmds: ["rtk bun install --ignore-scripts"]
  dev:api:
    cmds: ["rtk go run ./apps/api"]
  dev:worker:
    cmds: ["rtk go run ./apps/worker"]
  dev:web:
    cmds: ["rtk bun run dev:web"]
  dev:realtime:
    cmds: ["rtk bun run dev:realtime"]
  migrate:
    cmds: ["rtk go run ./apps/migrate"]
  api:openapi:
    cmds: ["rtk go run ./tools/openapi"]
  api:client:generate:
    cmds: ["rtk task api:openapi", "rtk bun run --cwd apps/web api:generate"]
  api:client:check:
    cmds: ["rtk task api:client:generate", "rtk git diff --exit-code -- contracts/openapi apps/web/src/lib/api/generated"]
  test:
    cmds: ["rtk go test ./... -count=1", "rtk bun test apps/web apps/realtime packages/config packages/realtime"]
  lint:
    cmds: ["rtk bun run --cwd apps/web lint", "rtk bun run --cwd apps/realtime lint", "rtk bun run --cwd packages/config lint", "rtk bun run --cwd packages/realtime lint"]
  check-types:
    cmds: ["rtk bun run --cwd apps/web check-types", "rtk bun run --cwd apps/realtime check-types", "rtk bun run --cwd packages/config check-types", "rtk bun run --cwd packages/realtime check-types"]
  quality:
    cmds: ["rtk task test", "rtk task lint", "rtk task check-types", "rtk task api:client:check"]
  build:
    cmds: ["rtk go build ./apps/api ./apps/worker ./apps/migrate", "rtk bun run --cwd apps/web build", "rtk bun run --cwd apps/realtime build"]
