version: "3"

tasks:
  default:
    desc: Show available commands
    cmds: ["rtk task --list"]
  install:
    desc: Install Bun workspace dependencies
    cmds: ["rtk bun install --ignore-scripts"]
  doctor:
    desc: Verify required tools, local files, and Go configuration loading
    cmds:
      - |
        for tool in go bun task vx docker; do command -v "$tool" >/dev/null || { echo "missing required tool: $tool" >&2; exit 1; }; done
        docker compose version >/dev/null || { echo "docker compose is required" >&2; exit 1; }
        test -f .env || { echo "missing .env; run: cp .env.example .env" >&2; exit 1; }
        test -f .env.example || { echo "missing .env.example" >&2; exit 1; }
        test -f docker-compose.yml || { echo "missing docker-compose.yml" >&2; exit 1; }
        rtk go test ./internal/config -run '^TestLoad' -count=1
  dev:
    desc: Run default services, or selected services after -- (api worker scheduler web realtime)
    cmds:
      - |
        {{if .CLI_ARGS}}
        {{range .CLI_ARGS_LIST}}case "{{.}}" in api|worker|scheduler|web|realtime) ;; *) echo "unsupported dev service: {{.}}" >&2; exit 1;; esac
        {{end}}rtk task --parallel --output=interleaved {{range .CLI_ARGS_LIST}}dev:{{.}} {{end}}
        {{else}}rtk task --parallel --output=interleaved dev:api dev:worker dev:scheduler dev:web
        {{end}}
  dev:api:
    desc: Run the Go Huma API
    cmds: ["rtk go run ./apps/api"]
  dev:worker:
    desc: Run the Go River worker
    cmds: ["rtk go run ./apps/worker"]
  dev:scheduler:
    desc: Run the River periodic scheduler
    cmds: ["rtk go run ./apps/scheduler"]
  dev:web:
    desc: Run the TanStack Start web app
    cmds: ["rtk bun run dev:web"]
  dev:realtime:
    desc: Run the Socket.IO runtime
    cmds: ["rtk bun run dev:realtime"]
  migrate:
    desc: Apply Goose and River migrations
    cmds: ["rtk go run ./apps/migrate"]
  dev:migrate:
    desc: Run database migrations locally
    cmds: ["rtk go run ./apps/migrate"]
  db:generate:
    desc: Generate Ent client code
    cmds: ["rtk go generate ./database/schema"]
  db:migrate:
    desc: Apply Goose and River migrations
    cmds: ["rtk go run ./apps/migrate"]
  db:migrate:status:
    desc: Show Goose migration status
    cmds: ["rtk go run ./apps/migrate status"]
  api:openapi:
    desc: Export Huma OpenAPI document
    cmds: ["rtk go run ./tools/openapi"]
  api:client:generate:
    desc: Generate TypeScript SDK and TanStack Query support
    cmds: ["rtk task api:openapi", "rtk bun run --cwd apps/web api:generate"]
  api:client:check:
    desc: Verify generated API client is current
    cmds: ["rtk task api:client:generate", "rtk git diff --exit-code -- contracts/openapi apps/web/src/lib/api/generated"]
  add:usecase:
    cmds: ['test -n "{{.name}}" || { echo "name is required" >&2; exit 1; }', 'rtk vx gen vandor/go:usecase --apply --set name={{.name}}', 'task sync:usecase']
  add:http-handler:
    cmds: ['test -n "{{.name}}" && test -n "{{.method}}" && test -n "{{.path}}" || { echo "name, method, and path are required" >&2; exit 1; }', 'case "{{.method}}" in GET|POST|PUT|PATCH|DELETE) ;; *) echo "unsupported HTTP method: {{.method}}" >&2; exit 1;; esac', 'case "{{.path}}" in /api/v1/*) ;; *) echo "path must begin with /api/v1/: {{.path}}" >&2; exit 1;; esac', 'rtk vx gen vandor/go:http-handler --apply --set name={{.name}} --set method={{.method}} --set path={{.path}}', 'task sync:http']
  add:job:
    cmds: ['test -n "{{.name}}" || { echo "name is required" >&2; exit 1; }', 'rtk vx gen vandor/go:job --apply --set name={{.name}}', 'task sync:worker']
  add:scheduler:
    cmds: ['test -n "{{.name}}" || { echo "name is required" >&2; exit 1; }', 'rtk vx gen vandor/go:scheduler --apply --set name={{.name}}', 'task sync:scheduler']
  sync:usecase:
    cmds: ["rtk go run ./vpkg/vandor/go/tools/sync --surface usecase"]
  sync:http:
    cmds: ["rtk go run ./vpkg/vandor/go/tools/sync --surface http"]
  sync:worker:
    cmds: ["rtk go run ./vpkg/vandor/go/tools/sync --surface worker"]
  sync:scheduler:
    cmds: ["rtk go run ./vpkg/vandor/go/tools/sync --surface scheduler"]
  sync:
    cmds: ["rtk task sync:usecase", "rtk task sync:http", "rtk task sync:worker", "rtk task sync:scheduler", "rtk gofmt -w internal/generated/fx", "rtk task api:client:generate"]
  test:go:
    desc: Run all Go tests
    cmds: ["rtk go test ./... -count=1"]
  test:web:
    desc: Run TanStack Start tests
    cmds: ["rtk bun test apps/web"]
  test:realtime:
    desc: Run Socket.IO runtime and shared realtime tests
    cmds: ["rtk bun test apps/realtime packages/realtime"]
  test:config:
    desc: Run shared configuration tests
    cmds: ["rtk bun test packages/config"]
  test:
    desc: Run Go and retained TypeScript tests
    cmds: ["rtk task test:go", "rtk task test:web", "rtk task test:realtime", "rtk task test:config", "rtk bun run check:tasks", "rtk bun run check:architecture-docs", "rtk bun run scripts/check-vpkg-templates.ts"]
  lint:
    desc: Lint retained TypeScript workspaces
    cmds: ["rtk bun run --cwd apps/web lint", "rtk bun run --cwd apps/realtime lint", "rtk bun run --cwd packages/config lint", "rtk bun run --cwd packages/realtime lint"]
  check-types:
    desc: Typecheck retained TypeScript workspaces
    cmds: ["rtk bun run --cwd apps/web check-types", "rtk bun run --cwd apps/realtime check-types", "rtk bun run --cwd packages/config check-types", "rtk bun run --cwd packages/realtime check-types"]
  quality:
    desc: Run tests, lint, typechecks, and API generation check
    cmds: ["rtk task test", "rtk go vet ./...", "rtk task lint", "rtk task check-types", "rtk task api:client:check", "rtk ./scripts/check-generated.sh", "rtk git diff --check"]
  build:
    desc: Build all Go and retained TypeScript runtimes
    cmds: ["rtk go build ./apps/api ./apps/worker ./apps/scheduler ./apps/migrate", "rtk bun run --cwd apps/web build", "rtk bun run --cwd apps/realtime build", "rtk git diff --exit-code -- apps/web/src/routeTree.gen.ts"]
  ci:
    desc: Run the complete CI verification locally
    cmds: ["rtk task quality", "rtk task build"]
