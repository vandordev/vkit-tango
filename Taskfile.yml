version: "3"

tasks:
  default:
    desc: Show available tasks
    cmds:
      - rtk task --list

  install:
    desc: Install workspace dependencies without lifecycle scripts
    cmds:
      - rtk bun install --ignore-scripts

  dev:
    desc: Run the web app with embedded Elysia
    cmds:
      - rtk bun run dev

  dev:standalone-api:
    desc: Run the standalone API process
    cmds:
      - rtk bun run dev:standalone-api

  dev:jobs:
    desc: Run the optional worker and scheduler
    cmds:
      - rtk bun run dev:jobs

  dev:api:
    desc: Run the API in development mode
    cmds:
      - rtk bun run dev:api

  dev:web:
    desc: Run the web app in development mode
    cmds:
      - rtk bun run dev:web

  dev:worker:
    desc: Run the worker in development mode
    cmds:
      - rtk bun run dev:worker

  dev:scheduler:
    desc: Run the scheduler in development mode
    cmds:
      - rtk bun run dev:scheduler

  dev:realtime:
    desc: Run the optional realtime runtime
    cmds:
      - rtk bun run dev:realtime

  start:
    desc: Start the web app with embedded Elysia
    cmds:
      - rtk bun run start

  start:jobs:
    desc: Start the optional worker and scheduler
    cmds:
      - rtk bun run start:jobs

  start:api:
    desc: Start the built API
    cmds:
      - rtk bun run start:api

  start:web:
    desc: Start the built web app
    cmds:
      - rtk bun run start:web

  start:worker:
    desc: Start the built worker
    cmds:
      - rtk bun run start:worker

  start:scheduler:
    desc: Start the built scheduler
    cmds:
      - rtk bun run start:scheduler

  start:realtime:
    desc: Start the optional realtime runtime
    cmds:
      - rtk bun run start:realtime

  build:
    desc: Type-check and build every runtime
    cmds:
      - rtk bun run build

  build:api:
    desc: Build the API runtime
    cmds:
      - rtk turbo run build --filter=@repo/api

  build:web:
    desc: Build the web runtime
    cmds:
      - rtk turbo run build --filter=web

  build:worker:
    desc: Build the worker runtime
    cmds:
      - rtk turbo run build --filter=@repo/worker

  build:scheduler:
    desc: Build the scheduler runtime
    cmds:
      - rtk turbo run build --filter=@repo/scheduler

  lint:
    desc: Lint all workspaces
    cmds:
      - rtk bun run lint

  lint:api:
    desc: Lint the API package
    cmds:
      - rtk turbo run lint --filter=@repo/api

  lint:web:
    desc: Lint the web package
    cmds:
      - rtk turbo run lint --filter=web

  lint:worker:
    desc: Lint the worker package
    cmds:
      - rtk turbo run lint --filter=@repo/worker

  lint:scheduler:
    desc: Lint the scheduler package
    cmds:
      - rtk turbo run lint --filter=@repo/scheduler

  check-types:
    desc: Type-check all workspaces
    cmds:
      - rtk bun run check-types

  check-types:api:
    desc: Type-check the API package
    cmds:
      - rtk turbo run check-types --filter=@repo/api

  check-types:web:
    desc: Type-check the web package
    cmds:
      - rtk turbo run check-types --filter=web

  check-types:worker:
    desc: Type-check the worker package
    cmds:
      - rtk turbo run check-types --filter=@repo/worker

  check-types:scheduler:
    desc: Type-check the scheduler package
    cmds:
      - rtk turbo run check-types --filter=@repo/scheduler

  format:
    desc: Format source and documentation
    cmds:
      - rtk bun run format

  quality:
    desc: Run tests, lint, and typecheck
    cmds:
      - rtk task test
      - rtk task lint
      - rtk task check-types

  test:
    desc: Run every Bun test
    cmds:
      - rtk bun test

  test:api:
    desc: Test the API package
    cmds:
      - rtk bun test apps/api

  test:web:
    desc: Test the web package
    cmds:
      - rtk bun test apps/web

  test:worker:
    desc: Test the worker package
    cmds:
      - rtk bun test apps/worker

  test:scheduler:
    desc: Test the scheduler package
    cmds:
      - rtk bun test apps/scheduler

  test:config:
    desc: Test typed runtime configuration
    cmds:
      - rtk bun test packages/config

  test:queue:
    desc: Test the PostgreSQL queue boundary
    cmds:
      - rtk bun test packages/queue

  test:database:
    desc: Test the database package
    cmds:
      - rtk bun test packages/database

  clean:
    desc: Clean all generated build artifacts
    cmds:
      - rtk bun run clean

  db:generate:
    desc: Generate the Prisma client
    dir: packages/database
    cmds:
      - rtk bun run db:generate

  db:migrate:
    desc: Apply committed Prisma migrations
    dir: packages/database
    cmds:
      - rtk bun run db:migrate

  db:migrate:dev:
    desc: Create and apply a development migration
    dir: packages/database
    cmds:
      - rtk bun run db:migrate:dev

  db:studio:
    desc: Open Prisma Studio
    dir: packages/database
    cmds:
      - rtk bunx prisma studio

  api:health:
    desc: Check the standalone API health endpoint
    cmds:
      - rtk curl --fail http://localhost:4101/health

  web:health:
    desc: Check the embedded Elysia health endpoint
    cmds:
      - rtk curl --fail http://localhost:4100/health

  api:status:
    desc: Check the API status endpoint
    cmds:
      - rtk curl --fail http://localhost:4101/api/status

  compose:up:
    desc: Build and run the core web plus embedded Elysia stack
    cmds:
      - rtk docker compose up --build

  compose:jobs:
    desc: Build and run the optional worker and scheduler profile
    cmds:
      - rtk docker compose --profile jobs up --build

  compose:realtime:
    desc: Build and run the optional realtime profile
    cmds:
      - rtk docker compose --profile realtime up --build

  compose:up:detached:
    desc: Build and run the stack in the background
    cmds:
      - rtk docker compose up --build -d

  compose:down:
    desc: Stop the Docker Compose stack
    cmds:
      - rtk docker compose down

  compose:logs:
    desc: Follow Docker Compose logs
    cmds:
      - rtk docker compose logs -f

  compose:ps:
    desc: Show Docker Compose service status
    cmds:
      - rtk docker compose ps
