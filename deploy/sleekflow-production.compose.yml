services:
  api:
    build:
      context: ./oriskin-sleekflow-gateway
      dockerfile: Dockerfile.api
    container_name: oriskin-taskman-api
    restart: unless-stopped
    env_file:
      - .env.api
    environment:
      NODE_ENV: production
      PORT: 4101
      CORS_ORIGIN: https://sleekflow.oriskin.co.id
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bun --eval \"fetch('http://127.0.0.1:4101/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik_proxy
      - traefik.http.routers.oriskin-taskman-api.rule=Host(`sleekflow.oriskin.co.id`) && PathPrefix(`/health`)
      - traefik.http.routers.oriskin-taskman-api.entrypoints=websecure
      - traefik.http.routers.oriskin-taskman-api.tls=true
      - traefik.http.routers.oriskin-taskman-api.tls.certresolver=myresolver
      - traefik.http.routers.oriskin-taskman-api.priority=100
      - traefik.http.services.oriskin-taskman-api.loadbalancer.server.port=4101
    networks:
      - internal
      - traefik_proxy

  web:
    build:
      context: ./oriskin-sleekflow-gateway
      dockerfile: Dockerfile.web
    container_name: oriskin-taskman-web
    restart: unless-stopped
    env_file:
      - .env.web
    environment:
      NODE_ENV: production
      PORT: 4100
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_APP_URL: https://sleekflow.oriskin.co.id
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:4100').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik_proxy
      - traefik.http.routers.oriskin-taskman-web.rule=Host(`sleekflow.oriskin.co.id`)
      - traefik.http.routers.oriskin-taskman-web.entrypoints=websecure
      - traefik.http.routers.oriskin-taskman-web.tls=true
      - traefik.http.routers.oriskin-taskman-web.tls.certresolver=myresolver
      - traefik.http.routers.oriskin-taskman-web.priority=1
      - traefik.http.services.oriskin-taskman-web.loadbalancer.server.port=4100
    networks:
      - internal
      - traefik_proxy

networks:
  internal:
    name: oriskin-taskman-internal
  traefik_proxy:
    external: true
    name: traefik_proxy
